# --- Console / printk ---
CONFIG_PRINTK=y
CONFIG_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
 
# --- Logging (LOG_INF / LOG_WRN from the driver) ---
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_SENSOR_LOG_LEVEL_DBG=y
 
# --- Sensor subsystem + I2C ---
CONFIG_SENSOR=y
CONFIG_I2C=y
CONFIG_GPIO=y
CONFIG_LED_STRIP=y

# --- Our out-of-tree driver ---
CONFIG_REMOTE_PICO=y
 
# --- Reasonable stack for main ---
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
