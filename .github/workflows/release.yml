name: zephyr-release
on:
  release:
    types: [created]
permissions:
  contents: write
jobs:
  build-and-release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: base_station
            board: rpi_pico2/rp2350a/m33
            board_id: rpi_pico2_rp2350a_m33
          - app: sensor_node
            board: rpi_pico2/rp2350a/m33
            board_id: rpi_pico2_rp2350a_m33
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Setup Zephyr (SDK + west modules)
        uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: .
          toolchains: arm-zephyr-eabi
      - name: Build
        run: |
          west build -b ${{ matrix.board }} ${{ matrix.app }} -p auto -d build/${{ matrix.app }}
      - name: Package
        run: |
          mkdir -p dist
          cp build/${{ matrix.app }}/zephyr/zephyr.uf2 dist/${{ matrix.app }}-${{ matrix.board_id }}-${{ github.event.release.tag_name }}.uf2
          cp build/${{ matrix.app }}/zephyr/zephyr.elf dist/${{ matrix.app }}-${{ matrix.board_id }}-${{ github.event.release.tag_name }}.elf
          cp build/${{ matrix.app }}/zephyr/zephyr.hex dist/${{ matrix.app }}-${{ matrix.board_id }}-${{ github.event.release.tag_name }}.hex || true
          cp build/${{ matrix.app }}/zephyr/zephyr.bin dist/${{ matrix.app }}-${{ matrix.board_id }}-${{ github.event.release.tag_name }}.bin || true
      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: dist/*